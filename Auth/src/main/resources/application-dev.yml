server:
  port: 8082
spring:
  grpc:
    server:
      port: 9090
  datasource:
    url: jdbc:postgresql://localhost:5432/authentication_db
    username: authuser
    password: authpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

