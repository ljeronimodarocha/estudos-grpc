spring:
  grpc:
    server:
      port: 9090
    client:
      channels:
        usuarios-service:
          address: "localhost:9091"
  datasource:
    url: jdbc:postgresql://localhost:5432/authentication_db
    username: authuser
    password: authpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      use-new-id-generator-mappings: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8082

jwt:
  token-validity-seconds: 3600
  refresh-token-validity-seconds: 86400
  secret-key: 401e12f35a6b8c7d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d

cache:
  redis:
    host: localhost
    port: 6379

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.grpc: TRACE
