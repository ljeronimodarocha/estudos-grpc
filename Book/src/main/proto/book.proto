syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.bookapp.proto";
option java_outer_classname = "BookProto";
option optimize_for = SPEED;

package com.example.bookapp.proto;

// Book service definition
service BookService {
  // Get a book by ID
  rpc GetBook (BookId) returns (Book) {}
}

// Book ID request
message BookId {
  string id = 1;
}

// Book response
message Book {
  string id = 1;
  string title = 2;
  string author = 3;
  int32 year = 4;
}